name: week_habit_tracker
description: "A weekly habit tracker with hours and segment-based goals."
publish_to: "none"
version: 0.1.0

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Database
  drift: ^2.20.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.4
  path: ^1.9.0

  # State management
  flutter_riverpod: ^2.5.1

  # Date formatting / week-range display
  intl: ^0.19.0

  # Nice-to-have, not required
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Codegen for Drift
  drift_dev: ^2.20.0
  build_runner: ^2.4.11

  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
